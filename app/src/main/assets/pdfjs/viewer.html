<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <script src="pdf.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #0B0F19;
            width: 100%;
        }
        #viewer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
        }
        .page-container {
            position: relative;
            background-color: white;
            margin-bottom: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            display: inline-block;
        }
        canvas {
            display: block;
        }
        .textLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: auto;
            line-height: 1;
        }
        .textLayer span {
            color: transparent;
            position: absolute;
            white-space: pre;
            cursor: text;
            transform-origin: 0% 0%;
            user-select: text;
            -webkit-user-select: text;
        }
        .textLayer ::selection {
            background: rgba(0, 120, 255, 0.3);
            color: transparent;
        }
        .custom-link {
            position: absolute;
            background: transparent;
            cursor: pointer;
            border: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="viewer-container"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';

        const base64Data = AndroidPdfBridge.getPdfBase64();
        
        if (base64Data) {
            const raw = window.atob(base64Data);
            const array = new Uint8Array(len = raw.length);
            for(let i = 0; i < len; i++) {
                array[i] = raw.charCodeAt(i);
            }

            pdfjsLib.getDocument({data: array}).promise.then(function(pdf) {
                const container = document.getElementById('viewer-container');
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    renderPage(pdf, pageNum, container);
                }
            });
        }

        function renderPage(pdf, pageNum, container) {
            pdf.getPage(pageNum).then(function(page) {
                const pageContainer = document.createElement('div');
                pageContainer.className = 'page-container';
                container.appendChild(pageContainer);

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                pageContainer.appendChild(canvas);

                const screenWidth = window.innerWidth;
                const pixelRatio = window.devicePixelRatio || 2;
                const baseViewport = page.getViewport({ scale: 1.0 });
                const displayScale = screenWidth / baseViewport.width;
                const scale = displayScale * pixelRatio;
                const viewport = page.getViewport({ scale: scale });
                const displayViewport = page.getViewport({ scale: displayScale });

                canvas.width = viewport.width;
                canvas.height = viewport.height;
                canvas.style.width = (viewport.width / pixelRatio) + 'px';
                canvas.style.height = (viewport.height / pixelRatio) + 'px';

                pageContainer.style.width = (viewport.width / pixelRatio) + 'px';
                pageContainer.style.height = (viewport.height / pixelRatio) + 'px';

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };

                page.render(renderContext).promise.then(function() {

                    // Text Layer يدوي بـ displayViewport الصح
                    page.getTextContent().then(function(textContent) {
                        const textLayerDiv = document.createElement('div');
                        textLayerDiv.className = 'textLayer';
                        pageContainer.appendChild(textLayerDiv);

                        textContent.items.forEach(function(item) {
                            if (!item.str || item.str.trim() === '') return;

                            const tx = pdfjsLib.Util.transform(
                                displayViewport.transform,
                                item.transform
                            );

                            const span = document.createElement('span');
                            span.textContent = item.str;

                            const fontSize = Math.sqrt(tx[2] * tx[2] + tx[3] * tx[3]);
                            const angle = Math.atan2(tx[1], tx[0]);

                            span.style.fontSize = fontSize + 'px';
                            span.style.left = tx[4] + 'px';
                            span.style.top = (tx[5] - fontSize) + 'px';

                            let transform = '';
                            if (Math.abs(angle) > 0.001) {
                                transform += 'rotate(' + (-angle) + 'rad) ';
                            }

                            if (item.width > 0 && item.str.length > 0) {
                                const expectedWidth = item.width * displayScale;
                                const actualWidth = item.str.length * fontSize * 0.55;
                                const scaleX = expectedWidth / actualWidth;
                                if (scaleX > 0 && scaleX < 10 && !isNaN(scaleX)) {
                                    transform += 'scaleX(' + scaleX + ')';
                                }
                            }

                            if (transform) {
                                span.style.transform = transform;
                            }

                            textLayerDiv.appendChild(span);
                        });
                    });

                    // Annotation Layer للروابط والنطق
                    page.getAnnotations().then(function(annotations) {
                        annotations.forEach(function(annot) {
                            if (annot.url) {
                                const linkBtn = document.createElement('a');
                                linkBtn.className = 'custom-link';
                                linkBtn.href = annot.url;

                                const rect = displayViewport.convertToViewportRectangle(annot.rect);

                                linkBtn.style.left = Math.min(rect[0], rect[2]) + 'px';
                                linkBtn.style.top = Math.min(rect[1], rect[3]) + 'px';
                                linkBtn.style.width = Math.abs(rect[2] - rect[0]) + 'px';
                                linkBtn.style.height = Math.abs(rect[3] - rect[1]) + 'px';

                                pageContainer.appendChild(linkBtn);
                            }
                        });
                    });
                });
            });
        }

        document.addEventListener('click', function(e) {
            const targetLink = e.target.closest('.custom-link');
            if (targetLink && targetLink.href) {
                e.preventDefault();
                AndroidPdfBridge.onLinkIntercepted(targetLink.href);
            }
        });
    </script>
</body>
</html>
