<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <script src="pdf.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #0B0F19;
            width: 100%;
        }
        #viewer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
        }
        .page-container {
            position: relative;
            background-color: white;
            margin-bottom: 8px; /* فواصل صغيرة واحترافية مثل WPS */
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            display: inline-block;
        }
        canvas {
            display: block;
        }
        /* طبقة الروابط التفاعلية المخصصة */
        .custom-link {
            position: absolute;
            background: transparent;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
    <div id="viewer-container"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';

        // سحب بايتات الملف المشفرة من الكوتلن لكسر الحظر الأمني
        const base64Data = AndroidPdfBridge.getPdfBase64();
        
        if (base64Data) {
            const raw = window.atob(base64Data);
            const array = new Uint8Array(len = raw.length);
            for(let i = 0; i < len; i++) {
                array[i] = raw.charCodeAt(i);
            }

            // فتح المستند بالكامل
            pdfjsLib.getDocument({data: array}).promise.then(function(pdf) {
                const container = document.getElementById('viewer-container');
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    renderPage(pdf, pageNum, container);
                }
            });
        }

        function renderPage(pdf, pageNum, container) {
            pdf.getPage(pageNum).then(function(page) {
                const pageContainer = document.createElement('div');
                pageContainer.className = 'page-container';
                container.appendChild(pageContainer);

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                pageContainer.appendChild(canvas);

                // رسم المستند بحجمه الأصلي والكامل (Scale 1.5 يعطي أبعاد ممتازة للشاشة)
                const viewport = page.getViewport({ scale: 1.5 });
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                
                // إجبار الحاوية على أخذ أبعاد الصفحة بالملي لمنع الانكماش
                pageContainer.style.width = viewport.width + 'px';
                pageContainer.style.height = viewport.height + 'px';

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                page.render(renderContext).promise.then(function() {
                    // [السر البرمجي 🛡️]: صيد الروابط من الـ Annotation Layer ورسمها فوق الصفحة
                    page.getAnnotations().then(function(annotations) {
                        annotations.forEach(function(annot) {
                            if (annot.url) {
                                const linkBtn = document.createElement('a');
                                linkBtn.className = 'custom-link';
                                linkBtn.href = annot.url;
                                
                                // تحويل إحداثيات الـ PDF الرياضية إلى أبعاد بكسل مطابقة للشاشة
                                const rect = viewport.convertToViewportRectangle(annot.rect);
                                
                                linkBtn.style.left = Math.min(rect[0], rect[2]) + 'px';
                                linkBtn.style.top = Math.min(rect[1], rect[3]) + 'px';
                                linkBtn.style.width = Math.abs(rect[2] - rect[0]) + 'px';
                                linkBtn.style.height = Math.abs(rect[3] - rect[1]) + 'px';
                                
                                pageContainer.appendChild(linkBtn);
                            }
                        });
                    });
                });
            });
        }

        // إرسال الرابط فوراً عند النقر عليه إلى الكوتلن لمنع المتصفح الداخلي من التخريف
        document.addEventListener('click', function(e) {
            const targetLink = e.target.closest('.custom-link');
            if (targetLink && targetLink.href) {
                e.preventDefault();
                AndroidPdfBridge.onLinkIntercepted(targetLink.href);
            }
        });
    </script>
</body>
</html>
