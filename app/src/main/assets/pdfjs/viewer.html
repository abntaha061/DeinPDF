<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PurePDF Viewer</title>
    <script src="pdf.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #0B0F19; /* نفس ثيم تطبيقك الداكن */
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        #viewer-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
        }
        .page-block {
            position: relative;
            width: 100%; /* شاشة كاملة متجاوبة */
            margin-bottom: 4px; /* فواصل صغيرة واحترافية مثل WPS */
            background-color: #ffffff;
            box-sizing: border-box;
        }
        canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }
        /* طبقة النصوص والروابط التفاعلية */
        .textLayer {
            position: absolute;
            left: 0; top: 0; right: 0; bottom: 0;
            overflow: hidden;
            opacity: 1;
            line-height: 1.0;
        }
        .textLayer span {
            color: transparent; /* شفافة لتظهر طباعة الـ PDF الأصلية تحتها */
            position: absolute;
            white-space: pre;
            cursor: text;
            transform-origin: 0% 0%;
        }
        .textLayer a {
            position: absolute;
            display: block;
            background: transparent;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="viewer-container"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';

        // جلب ملف الـ PDF كـ Base64 من تطبيق الأندرويد لضمان تخطي الحماية والأمان
        const base64Buffer = AndroidPdfBridge.getPdfBase64();
        
        if (base64Buffer) {
            const binaryString = window.atob(base64Buffer);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            // فتح المستند
            pdfjsLib.getDocument({ data: bytes }).promise.then(function(pdf) {
                const container = document.getElementById('viewer-container');
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    renderPdfPage(pdf, pageNum, container);
                }
            }).catch(function(error) {
                console.error("Error loading PDF: " + error);
            });
        }

        function renderPdfPage(pdf, pageNum, container) {
            pdf.getPage(pageNum).then(function(page) {
                const pageBlock = document.createElement('div');
                pageBlock.className = 'page-block';
                container.appendChild(pageBlock);

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                pageBlock.appendChild(canvas);

                // رسم بجودة عالية جداً (Scale 2.0) لمنع البكسلة نهائياً عند الزووم
                const viewport = page.getViewport({ scale: 2.0 });
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };

                page.render(renderContext).promise.then(function() {
                    // إنشاء طبقة النصوص والروابط فوق الصفحة
                    const textLayerDiv = document.createElement('div');
                    textLayerDiv.className = 'textLayer';
                    pageBlock.appendChild(textLayerDiv);

                    page.getTextContent().then(function(textContent) {
                        pdfjsLib.renderTextLayer({
                            textContent: textContent,
                            container: textLayerDiv,
                            viewport: viewport,
                            textDivs: []
                        });
                    });
                });
            });
        }

        // الكود السحري: التقاط أي ضغطة على رابط (سواء Arabdict أو صوت) وتمريرها فوراً للأندرويد
        document.addEventListener('click', function(e) {
            const anchor = e.target.closest('a');
            if (anchor && anchor.href) {
                e.preventDefault(); // منع المتصفح الافتراضي الداخلي من التصرف بالرابط
                AndroidPdfBridge.onLinkIntercepted(anchor.href); // إرساله فوراً إلى كود كوتلن
            }
        });
    </script>
</body>
</html>
