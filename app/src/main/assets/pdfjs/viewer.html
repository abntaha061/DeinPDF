<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <script src="pdf.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0B0F19;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #viewer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
        }
        .page-container {
            position: relative;
            margin-bottom: 15px;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
        }
        /* تصميم طبقة النصوص والروابط التفاعلية السحرية */
        .textLayer {
            position: absolute;
            left: 0; top: 0; right: 0; bottom: 0;
            overflow: hidden;
            opacity: 1;
            line-height: 1.0;
        }
        .textLayer span, .textLayer br {
            color: transparent; /* جعل النص شفاف ليظهر رسم الـ PDF الأصلي تحته */
            position: absolute;
            white-space: pre;
            cursor: text;
            transform-origin: 0% 0%;
        }
        /* تفعيل نقرات الروابط المدمجة داخل النصوص */
        .textLayer a {
            color: transparent;
            cursor: pointer;
            position: absolute;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>

    <script>
        // إعداد وتشغيل مشغل الـ PDF الخلفي
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';

        // سحب بيانات الملف من كوتلن كـ Base64 لكسر حظر الأمان
        const base64Data = AndroidPdfBridge.getPdfBase64();
        
        if (!base64Data) {
            document.getElementById('viewer').innerHTML = "<p style='color:red;text-align:center;'>خطأ في قراءة ملف المستند الرسمي.</p>";
        } else {
            // تحويل النص المشفر إلى مصفوفة بايتات حقيقية يفهمها المحرك
            const raw = window.atob(base64Data);
            const array = new Uint8Array(new ArrayBuffer(raw.length));
            for(let i = 0; i < raw.length; i++) {
                array[i] = raw.charCodeAt(i);
            }

            // تحميل المستند ورسمه بالكامل صفحة صفحة
            pdfjsLib.getDocument({data: array}).promise.then(function(pdf) {
                const viewer = document.getElementById('viewer');
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    renderPage(pdf, pageNum, viewer);
                }
            });
        }

        function renderPage(pdf, pageNum, container) {
            pdf.getPage(pageNum).then(function(page) {
                const pageContainer = document.createElement('div');
                pageContainer.className = 'page-container';
                container.appendChild(pageContainer);

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                pageContainer.appendChild(canvas);

                // زيادة الـ Scale إلى 2.0 للحصول على جودة خارقة تمنع البكسلة تماماً عند عمل زووم
                const viewport = page.getViewport({ scale: 2.0 });
                
                const outputScale = window.devicePixelRatio || 1;
                canvas.width = Math.floor(viewport.width * outputScale);
                canvas.height = Math.floor(viewport.height * outputScale);
                
                // ملاءمة حجم العرض والارتفاع انسيابياً مع الشاشة
                pageContainer.style.width = "95%";
                pageContainer.style.maxWidth = Math.floor(viewport.width / 2) + "px";
                
                const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

                const renderContext = {
                    canvasContext: context,
                    transform: transform,
                    viewport: viewport
                };
                
                page.render(renderContext).promise.then(function() {
                    // بناء طبقة النصوص فوق الرسم بعد اكتماله
                    const textLayerDiv = document.createElement('div');
                    textLayerDiv.className = 'textLayer';
                    pageContainer.appendChild(textLayerDiv);

                    // ضبط أبعاد الطبقة النصية لتتطابق رياضياً مع أماكن الحروف
                    const containerWidth = pageContainer.clientWidth;
                    const scaleFactor = containerWidth / viewport.width;
                    
                    textLayerDiv.style.transform = `scale(${scaleFactor})`;
                    textLayerDiv.style.width = viewport.width + "px";
                    textLayerDiv.style.height = viewport.height + "px";

                    page.getTextContent().then(function(textContent) {
                        pdfjsLib.renderTextLayer({
                            textContent: textContent,
                            container: textLayerDiv,
                            viewport: viewport,
                            textDivs: []
                        });
                    });
                });
            });
        }
    </script>
</body>
</html>
